# Production: docker compose -f docker-compose.prod.yml up -d --build
#
# Архитектура:
#   nginx на хосте (порт 80/443) → localhost:3000 (frontend) и localhost:8080 (backend)
#   postgres и minio доступны ТОЛЬКО внутри Docker сети
#
# MinIO console на проде — только через SSH tunnel:
#   ssh -L 9001:localhost:9001 deploy@147.45.153.120

networks:
  recipebook:
    driver: bridge

services:
  postgres:
    image: postgres:16
    networks:
      - recipebook
    environment:
      POSTGRES_DB: recipebook
      POSTGRES_USER: recipebook
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Порт НЕ открыт наружу — только внутри Docker сети
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipebook"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    networks:
      - recipebook
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    # Порты НЕ открыты наружу — backend обращается по http://minio:9000
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    networks:
      - recipebook
    ports:
      - "8080:8080"
    env_file:
      - backend/.env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: /api/v1
    networks:
      - recipebook
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
